
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拉圖斯助手-獨立炸彈版</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-wrap: wrap; justify-content: space-around; padding: 10px; user-select: none; touch-action: manipulation; }
        .btn { width: 48%; padding: 18px; border-radius: 10px; font-weight: bold; border: none; margin-bottom: 20px; color: white; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .card { background: #1e1e1e; border-radius: 12px; width: 45%; margin-bottom: 12px; padding: 15px 0; text-align: center; border: 2px solid #444; }
        .t { font-size: 24px; font-weight: bold; font-family: 'Courier New', monospace; margin-top: 5px; }
        .flash { animation: slow-flash 0.5s infinite; } 
        @keyframes slow-flash { 
            0% { background: #1e1e1e; }
            50% { background: #c0392b; } 
            100% { background: #1e1e1e; }
        }
        .warn { color: #ff4757 !important; }
    </style>
</head>
<body>
    <button class="btn" style="background: #c0392b" onclick="manualTriggerF1()">【F1】大連動</button>
    <button class="btn" style="background: #2980b9" onclick="triggerF3()">【F3】黑水連動</button>

    <div id="shield" class="card" style="border-color: #e67e22">⚔️ 反盾(F1)<div class="t">READY</div></div>
    <div id="mob" class="card" style="border-color: #2ecc71">⏰ 小怪<div class="t">READY</div></div>
    <div id="orb" class="card" style="border-color: #a29bfe">✨ 黑球<div class="t">READY</div></div>
    <div id="bomb" class="card" style="border-color: #f1c40f" onclick="triggerF2()">💣 炸彈(F2)<div class="t">READY</div></div>
    <div id="water" class="card" style="border-color: #3498db">💧 黑水(F3)<div class="t">READY</div></div>
    <div id="stay" class="card" style="border-color: #00d2d3">⏳ 持續時間<div class="t">READY</div></div>

<script>
    const timers = {
        shield: { v:0, m:120, auto:true }, 
        mob:    { v:0, m:50,  auto:true },
        orb:    { v:0, m:14,  auto:false }, 
        bomb:   { v:0, m:30,  auto:false },
        water:  { v:0, m:70,  auto:true }, 
        stay:   { v:0, m:30,  auto:false }
    };

    // F1 手動按下：啟動所有，包含炸彈
    function manualTriggerF1() {
        timers.shield.v = 120;
        timers.mob.v = 50;
        timers.orb.v = 14;
        timers.bomb.v = 30; // 只有手動按 F1 會動到炸彈
    }

    // F1 自動循環觸發：不包含炸彈
    function autoTriggerF1() {
        timers.shield.v = 120;
        timers.mob.v = 50;
        timers.orb.v = 14;
        // 這裡不重置炸彈
    }

    function triggerF2() {
        timers.bomb.v = 30;
    }

    function triggerF3() {
        timers.water.v = 70;
        timers.stay.v = 30;
    }

    setInterval(() => {
        for (let k in timers) {
            let t = timers[k]; 
            let el = document.getElementById(k);
            let timeDisplay = el.querySelector('.t');

            if(t.v > 0) {
                t.v = Math.max(0, t.v - 0.1);
                timeDisplay.innerText = t.v.toFixed(1) + "s";

                if(k == 'bomb' && t.v > 25) { el.classList.add('flash'); } 
                else { el.classList.remove('flash'); }

                if(t.v <= 5) { timeDisplay.classList.add('warn'); } 
                else { timeDisplay.classList.remove('warn'); }

                if(t.v <= 0 && t.auto) {
                    if (k == 'shield') autoTriggerF1(); // 自動循環不帶炸彈
                    if (k == 'water') triggerF3();
                }
            } else {
                timeDisplay.innerText = "READY";
                timeDisplay.classList.remove('warn');
                el.classList.remove('flash');
            }
        }
    }, 100);
</script>
</body>
</html>
